schema_version: 1

context:
  version: "0.18.6"

package:
  name: anycorn
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/a/anycorn/anycorn-${{ version }}.tar.gz
    sha256: 190a96cf7aaeab69669b1c30da7d44fde78ddc2e776a93d5ab656ba61cc69631

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - anycorn = anycorn.__main__:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build
  run:
    - python >=${{ python_min }}
    - exceptiongroup >=1.1.0,<2.0
    - h11
    - h2 >=3.1.0
    - hpack
    - anyio >=4.0,<5.0
    - priority
    - tomli
    - typing_extensions
    - wsproto >=0.14.0
    - rich-click >=1.8.3,<2.0.0

tests:
  - python:
      imports: anycorn
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - anycorn --help

about:
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/davidbrochart/anycorn
  summary: A fork of Hypercorn that uses AnyIO.

extra:
  recipe-maintainers:
    - davidbrochart
